{% extends 'website/base.html' %}

{% block content %}

<div class="update-container">

    <div class="update-card">

        <h2 class="update-title">
            Update Blog Post
        </h2>

        {% if blogpost.image %}
            <img src="{{ blogpost.image.url }}"
                 class="update-image"
                 alt="{{ blogpost.name }}">
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {% for field in form %}

                <div class="form-group">

                    <label>{{ field.label }}</label>

                    {{ field }}

                    {% for error in field.errors %}
                        <small class="form-error">
                            {{ error }}
                        </small>
                    {% endfor %}

                </div>

            {% endfor %}

            <div class="update-actions">

                <button type="submit" class="save-btn">
                    Save Changes
                </button>

                <a href="{% url 'blogs' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

        <!-- DELETE BLOG -->
        <form method="POST"
              action="{% url 'delete_blogpost' blogpost.pk %}"
              class="delete-form">

            {% csrf_token %}

            <button type="submit"
                    class="delete-btn"
                    onclick="return confirm('Are you sure you want to delete this blog post?');">

                Delete Blog Post

            </button>

        </form>

    </div>

</div>

{% endblock %}
