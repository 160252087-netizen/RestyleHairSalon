{% extends 'website/base.html' %}

{% block content %}

<div class="update-container">

    <div class="update-card">

        <h2 class="update-title">
            Update Product
        </h2>

        {% if product.image %}
            <img
                src="{{ product.image.url }}"
                class="update-image"
                alt="{{ product.title }}"
            >
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {% for field in form %}

                <div class="form-group">

                    <label>
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% for error in field.errors %}
                        <small class="form-error">
                            {{ error }}
                        </small>
                    {% endfor %}

                </div>

            {% endfor %}

            <div class="update-actions">

                <button type="submit" class="save-btn">
                    Save Changes
                </button>

                <a href="{% url 'products' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

        <!-- DELETE -->

        <form method="POST"
              action="{% url 'delete_product' product.pk %}"
              class="delete-form">

            {% csrf_token %}

            <button type="submit"
                    class="delete-btn"
                    onclick="return confirm('Delete this product?');">

                Delete Product

            </button>

        </form>

    </div>

</div>

{% endblock %}
